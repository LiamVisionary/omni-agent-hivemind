<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">HivemindOS Agent Relay</title>
  <desc id="desc">A clean relay-race style diagram of AI agent runtimes passing a glowing task baton through a shared HivemindOS layer, with artifacts, plans, verification notes, and status flowing between them.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#020617"/>
      <stop offset="0.55" stop-color="#08111f"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="layer" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0e7490" stop-opacity="0.22"/>
      <stop offset="0.5" stop-color="#7c3aed" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#10b981" stop-opacity="0.22"/>
    </linearGradient>
    <linearGradient id="baton" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#67e8f9"/>
      <stop offset="0.5" stop-color="#fef08a"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#fef08a" stop-opacity="0.95"/>
      <stop offset="0.35" stop-color="#22d3ee" stop-opacity="0.65"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.16 0 0 0 0 0.86 0 0 0 0 0.95 0 0 0 0.9 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="cardShadow" x="-20%" y="-30%" width="140%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#000814" flood-opacity="0.35"/>
    </filter>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#1e293b" stroke-width="1" opacity="0.55"/>
    </pattern>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#67e8f9" opacity="0.9"/>
    </marker>
    <style>
      .mono { font-family: 'SFMono-Regular', 'JetBrains Mono', 'Menlo', monospace; }
      .title { fill: #f8fafc; font-size: 46px; font-weight: 800; letter-spacing: -1px; }
      .subtitle { fill: #94a3b8; font-size: 20px; }
      .small { fill: #cbd5e1; font-size: 18px; font-weight: 700; }
      .tiny { fill: #94a3b8; font-size: 14px; }
      .label { fill: #f8fafc; font-size: 21px; font-weight: 800; }
      .runner-line { stroke: #64748b; stroke-width: 8; stroke-linecap: round; stroke-linejoin: round; }
      .motion { fill: none; stroke: #22d3ee; stroke-width: 3; stroke-linecap: round; stroke-dasharray: 10 14; opacity: 0.75; }
      .flow { fill: none; stroke: #67e8f9; stroke-width: 3; stroke-linecap: round; stroke-dasharray: 8 12; marker-end: url(#arrow); opacity: 0.8; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)" opacity="0.65"/>
  <circle cx="1260" cy="170" r="360" fill="#312e81" opacity="0.13"/>
  <circle cx="270" cy="730" r="340" fill="#155e75" opacity="0.13"/>

  <g class="mono">
    <text x="100" y="88" class="title">HivemindOS Agent Relay</text>
    <text x="104" y="124" class="subtitle">AI runtimes pass context through one shared layer: plans, artifacts, verification, and status.</text>
  </g>

  <g filter="url(#cardShadow)">
    <rect x="108" y="256" width="1384" height="318" rx="34" fill="url(#layer)" stroke="#22d3ee" stroke-width="2" opacity="0.96"/>
    <rect x="132" y="280" width="1336" height="270" rx="26" fill="#020617" opacity="0.38" stroke="#334155" stroke-width="1"/>
    <text x="800" y="336" text-anchor="middle" class="mono" fill="#e0f2fe" font-size="34" font-weight="900">Shared HivemindOS Layer</text>
    <text x="800" y="368" text-anchor="middle" class="mono" fill="#93c5fd" font-size="16">one durable workbench for handoffs, memory, and proof of work</text>
  </g>

  <path d="M192 430 C380 334, 470 518, 610 425 S875 345, 1016 423 S1255 528, 1400 420" class="flow"/>
  <path d="M205 464 C392 376, 481 548, 626 462 S890 382, 1030 462 S1266 560, 1414 456" class="motion" opacity="0.55"/>

  <g transform="translate(0,0)">
    <g filter="url(#softGlow)">
      <ellipse cx="724" cy="433" rx="110" ry="54" fill="url(#glow)" opacity="0.7"/>
      <rect x="638" y="407" width="172" height="42" rx="21" fill="url(#baton)"/>
      <rect x="662" y="415" width="76" height="9" rx="5" fill="#ffffff" opacity="0.56"/>
    </g>
    <text x="724" y="489" text-anchor="middle" class="mono" fill="#fef9c3" font-size="15" font-weight="800">glowing task baton</text>
  </g>

  <g class="mono" filter="url(#cardShadow)">
    <g transform="translate(224,404)">
      <circle cx="0" cy="-74" r="22" fill="#0f172a" stroke="#22d3ee" stroke-width="3"/>
      <path d="M0 -50 L-28 0 L-65 33 M-28 0 L18 32 M-11 -28 L48 -52 M-9 -29 L-62 -47" class="runner-line"/>
      <rect x="-86" y="54" width="172" height="60" rx="14" fill="rgba(8,51,68,0.76)" stroke="#22d3ee" stroke-width="2"/>
      <text y="90" text-anchor="middle" class="label">Codex</text>
    </g>
    <g transform="translate(494,434)">
      <circle cx="0" cy="-78" r="22" fill="#0f172a" stroke="#a78bfa" stroke-width="3"/>
      <path d="M0 -54 L-18 -3 L-57 37 M-18 -3 L36 25 M-7 -36 L49 -21 M-5 -35 L-58 -65" class="runner-line"/>
      <rect x="-102" y="54" width="204" height="60" rx="14" fill="rgba(76,29,149,0.72)" stroke="#a78bfa" stroke-width="2"/>
      <text y="90" text-anchor="middle" class="label">Claude Code</text>
    </g>
    <g transform="translate(810,407)">
      <circle cx="0" cy="-72" r="22" fill="#0f172a" stroke="#fbbf24" stroke-width="3"/>
      <path d="M0 -49 L-31 -1 L-74 33 M-31 -1 L26 36 M-17 -27 L48 -43 M-18 -27 L-68 -50" class="runner-line"/>
      <rect x="-100" y="55" width="200" height="60" rx="14" fill="rgba(120,53,15,0.66)" stroke="#fbbf24" stroke-width="2"/>
      <text y="91" text-anchor="middle" class="label">Gemini CLI</text>
    </g>
    <g transform="translate(1092,438)">
      <circle cx="0" cy="-80" r="22" fill="#0f172a" stroke="#34d399" stroke-width="3"/>
      <path d="M0 -56 L-23 -4 L-64 34 M-23 -4 L34 31 M-12 -37 L50 -18 M-11 -37 L-66 -62" class="runner-line"/>
      <rect x="-96" y="54" width="192" height="60" rx="14" fill="rgba(6,78,59,0.72)" stroke="#34d399" stroke-width="2"/>
      <text y="90" text-anchor="middle" class="label">OpenCode</text>
    </g>
    <g transform="translate(1360,408)">
      <circle cx="0" cy="-73" r="22" fill="#0f172a" stroke="#fb7185" stroke-width="3"/>
      <path d="M0 -50 L-29 0 L-70 32 M-29 0 L22 34 M-13 -30 L50 -44 M-13 -30 L-66 -52" class="runner-line"/>
      <rect x="-86" y="55" width="172" height="60" rx="14" fill="rgba(136,19,55,0.64)" stroke="#fb7185" stroke-width="2"/>
      <text y="91" text-anchor="middle" class="label">Hermes</text>
    </g>
  </g>

  <g class="mono" filter="url(#cardShadow)">
    <g transform="translate(274,640)">
      <rect x="0" y="0" width="216" height="88" rx="18" fill="#0f172a" stroke="#22d3ee" stroke-width="2"/>
      <circle cx="32" cy="34" r="10" fill="#22d3ee"/>
      <text x="58" y="38" class="small">Plans</text>
      <text x="28" y="66" class="tiny">scope, tasks, ownership</text>
    </g>
    <g transform="translate(526,640)">
      <rect x="0" y="0" width="216" height="88" rx="18" fill="#0f172a" stroke="#a78bfa" stroke-width="2"/>
      <path d="M28 28 h30 v28 h-30 z M36 20 h30 v28" fill="none" stroke="#a78bfa" stroke-width="3"/>
      <text x="72" y="38" class="small">Artifacts</text>
      <text x="28" y="66" class="tiny">code, docs, assets</text>
    </g>
    <g transform="translate(778,640)">
      <rect x="0" y="0" width="260" height="88" rx="18" fill="#0f172a" stroke="#34d399" stroke-width="2"/>
      <path d="M30 45 l14 14 l32 -38" fill="none" stroke="#34d399" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="92" y="38" class="small">Verification Notes</text>
      <text x="30" y="66" class="tiny">tests, evidence, review</text>
    </g>
    <g transform="translate(1074,640)">
      <rect x="0" y="0" width="216" height="88" rx="18" fill="#0f172a" stroke="#fbbf24" stroke-width="2"/>
      <circle cx="34" cy="44" r="16" fill="none" stroke="#fbbf24" stroke-width="4"/>
      <path d="M34 31 v13 l11 8" fill="none" stroke="#fbbf24" stroke-width="4" stroke-linecap="round"/>
      <text x="72" y="38" class="small">Status</text>
      <text x="28" y="66" class="tiny">queued, active, done</text>
    </g>
  </g>

  <g opacity="0.88">
    <path d="M384 628 C410 584, 450 558, 492 532" class="flow"/>
    <path d="M634 628 C650 590, 682 548, 718 454" class="flow"/>
    <path d="M908 628 C890 582, 852 530, 792 454" class="flow"/>
    <path d="M1182 628 C1150 584, 1110 552, 1060 512" class="flow"/>
  </g>

  <g class="mono">
    <rect x="116" y="770" width="1368" height="72" rx="20" fill="#020617" opacity="0.62" stroke="#334155"/>
    <text x="148" y="814" fill="#cbd5e1" font-size="20" font-weight="700">Handoff contract:</text>
    <text x="376" y="814" fill="#94a3b8" font-size="18">every runtime can pick up the baton because the shared layer carries intent, outputs, checks, and state.</text>
  </g>
</svg>
